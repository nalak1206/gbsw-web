<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>to do list</title>
    <style>
        .todo_wrap ul {
            margin: 0;
            padding: 0;
        }

        .todo_wrap li {
            list-style: none;
            width: 200px;
            padding: 20px 10px;
            background-color: skyblue;
            color: white;
            margin-bottom: 10px;
            border-radius: 10px;
            transition: all ease 0.25s;
        }

        .todo_wrap li:hover {
            background-color: rgb(121, 189, 216);
            scale: 1.05;
        }
    </style>
</head>

<body>
    <div class="tilte_wrap">
        <span id="title">to do list</span>
    </div>
    <div class="todo_wrap">
        <ul id="todo_list">

        </ul>
    </div>
    <input id="input_todo_title" type="text" />
    <button id="btn_add_todo_item">추가</button>
</body>
<script>
    document.getElementById("btn_add_todo_item").onclick = function () {
        const title = document.getElementById("input_todo_title").value;
        const item = `<li>${title}</li>`;
        let list = document.getElementById("todo_list");
        list.innerHTML += item;
    };
</script>

</html>
