<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo list</title>
    <style>
        @font-face {
            font-family: 'Juache';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_one@1.0/BMJUA.woff') format('woff');
            font-weight: normal;
            font-display: swap;
        }

        body {
            background-color: rgb(45, 45, 45);
            color: rgb(255, 229, 233);
            font-family: "Juache";
        }

        h1 {
            color: rgb(255, 40, 62);
            margin-bottom: 5px;
        }

        p {
            color: pink;
        }

        .wrap {
            width: 60%;
            margin: 20px auto 0;
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 20px;

        }

        img {
            width: 100%;
            border-radius: 10px;
        }

        .todo_wrap {
            background-color: rgb(90, 90, 90);
            margin-top: 15px;
            padding: 15px;
            border-radius: 5px;
        }

        h2 {
            color: lightcoral;
        }

        .todo_wrap h2,
        .todo_check_wrap h2 {
            margin-top: 0px;
        }

        .todo_check_wrap {
            background-color: rgb(90, 90, 90);
            margin-top: 15px;
            padding: 15px;
            border-radius: 5px;
        }

        button {
            background-color: rgb(70, 70, 70);
            border-radius: none;
            color: white;
            padding: 5px 10px;
            cursor: pointer;
            border-radius: 5px;
        }

        button:hover {
            background-color: rgb(250, 215, 220);
            color: black;
        }

        input {
            padding: 5px;
        }

        #todo_list li {
            margin-bottom: 5px;
        }

        #todo_list .todo_item.done {
            color: rgb(160, 160, 160)
        }
    </style>
</head>

<body>
    <div class="wrap">
        <h1>Todo list</h1>
        <p>할 일을 관리하는 목록입니다</p>
        <img src="./yuzuha.webp" alt="유즈하">

        <div class="todo_wrap">
            <h2>할 일 목록</h2>
            <ol id="todo_list"></ol>
        </div>

        <div class="todo_wrap">
            <h2>할 일 등록</h2>
            <input id="input_todo" type="text" placeholder="할 일을 입력하세요" />
            <button id="btn_add">등록</button>
        </div>

        <div class="todo_check_wrap">
            <h2>완료하기</h2>
            <p>완료 처리할 목록의 순번을 입력하고 버튼을 누르면 완료됩니다</p>
            <input id="input_todo_num" type="number" placeholder="끝낸 순번을 입력하세요" />
            <button id="btn_check">등록</button>
        </div>
    </div>
</body>
<script>
    const todos = ["몬스터 먹기", "몬스터 깔@롱하게 먹기", "몬스터 매@우;; 깔@롱하게 먹기"]

    function renderTodo(todo) {
        const li = document.createElement("li")
        li.textContent = todo;
        li.classList.add("todo_item");
        document.getElementById("todo_list").appendChild(li);
    }

    for (let i = 0; i < todos.length; i++) {
        renderTodo(todos[i]);
    }

    document.getElementById("btn_add").onclick = function () {
        const todo = document.getElementById("input_todo").value;
        todos.push(todo);
        renderTodo(todo);
    }

    document.getElementById("btn_check").onclick = function () {
        const num = document.getElementById("input_todo_num").value;
        if (num < 1 || num > todos.length) {
            alert(`1부터 ${todos.length} 사이의 값을 입력하시오`)
            return;
        }
        const todoItems = document.getElementsByClassName("todo_item");
        todoItems[num - 1].classList.add("done");


    };      
</script>

</html>
