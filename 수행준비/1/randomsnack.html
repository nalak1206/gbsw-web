<!DOCTYPE html>
<html lang="kr">

<!--  이건 '!' 쓰면 되니까 안 적어도 되지?  -->

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="./randomsnack.css" rel="stylesheet">
    <title>간식 추첨</title>
</head>

<body>
    <!--   class="wrap" ==   -->
    <div class="wrap">
        <h1>우리 반 간식 소개</h1>
        <p>친구들과 먹고 싶은 간식을 소개하는 웹 페이지입니다.</p>
        <!-- ../ 현재 폴더 기준 상위 폴더 -->
        <!-- ./ 현재 폴더 안의 파일 보는거 -->
        <!-- / 연 폴더의 최상위 폴더 -->
        <img src="./yuzuha.webp" alt="귀여운 우키나미 유즈하입니다" />

        <!--  리스트 영역  -->
        <div class="menu_box">
            <h2>인기간식</h2>
            <ul id="menu_list">
                <!-- ul == unordered list-->

            </ul>
        </div>
        <!--  간식 추가하는 입력 창 및 버튼  -->
        <div class="menu_box">
            <h2>간식 추가</h2>
            <input id="input_snack" type="text" placeholder="간식을 입력해주세요" />
            <button id="btn_add">추가</button>
        </div>

        <!--  추첨하는 영역  -->
        <div class="event_box">
            <h2>오늘의 간식</h2>
            <p id="event_result">결과값 영역</p>
            <button id="btn_event">랜덤 뽑기</button>
        </div>
    </div>
    <script src="./randomsnack.js"></script>

</body>

</html>
