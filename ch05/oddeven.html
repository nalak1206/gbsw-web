<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>odd and even</title>
</head>

<body>
    <h1>odd and even</h1>
    <input id="input_number" type="number" placeholder="정수입력">
    <button id="btn" type="button">next</button>
    <h1 id="result"></h1>
</body>

</html>
<script>
    document.getElementById("btn").onclick = function () {
        const num = document.getElementById("input_number").value;
        let result = null;
        if (num % 2 == 0) {
            result = "even";

        } else {
            result = "odd";

        }
        document.getElementById("result").textContent = result;
    };
</script>
